version: '3.9'

services:

  backend:
    build: 
      context: .
      dockerfile: backend/Dockerfile

    ports:
      - "5000:5000"

    volumes:
      - .:/app

    command: python -m backend.app

  frontend:
    build: 
      context: ./frontend

    ports:
      - "5173:5173"

    volumes:
      - ./frontend:/app
      - /app/node_modules

    command: npm run dev -- --host

    depends_on:
      - backend