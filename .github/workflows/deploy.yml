name: Production Deployment

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read
  packages: write

jobs:

  production-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up node
        uses: actions/setup-node@v4
        with: 
          node-version: "20"
          cache: "npm"
          cache-dependency-path: app/frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: ./app/frontend
        run: npm ci

      - name: Run frontend tests
        working-directory: ./app/frontend
        run: npm run test:unit

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11.7"

      - name: Install backend dependencies
        run: | 
          python -m pip install --upgrade pip
          pip install flask flask-cors pytest

      - name: Run backend tests
        run: pytest

  build-and-push:
    needs: production-check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./app/frontend
          file: ./app/frontend/Dockerfile
          push: true
          tags: |
            ghcr.io/keanu-ellary/calculator-frontend:latest
            ghcr.io/keanu-ellary/calculator-frontend:${{ github.ref_name }}

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./app
          file: ./app/backend/Dockerfile
          push: true
          tags: |
            ghcr.io/keanu-ellary/calculator-backend:latest
            ghcr.io/keanu-ellary/calculator-backend:${{ github.ref_name }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up SSH access to EC2
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Copy docker-compose.yml to EC2
        run: |
          ssh -i ~/.ssh/id_rsa ubuntu@${{ secrets.EC2_HOST }} "mkdir -p ~/calculator"
          rsync -az -e "ssh -i ~/.ssh/id_rsa" ./app/docker-compose.prod.yml ubuntu@${{ secrets.EC2_HOST }}:~/calculator/docker-compose.yml

      - name: Pull new images and restart containers
        run: |
          ssh -i ~/.ssh/id_rsa ubuntu@${{ secrets.EC2_HOST }} << 'EOF'
            cd ~/calculator
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose pull
            docker compose down || true
            docker compose up -d --remove-orphans
            docker image prune -a -f
          EOF